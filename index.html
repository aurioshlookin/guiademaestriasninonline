                                    <p className="text-sm text-slate-400">{content.tips.hp.desc}</p>
                                </div>
                                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 hover:border-indigo-500 transition-colors">
                                    <Brain className="w-8 h-8 text-blue-500 mb-3" />
                                    <h3 className="font-bold mb-2">{content.tips.dmg.title}</h3>
                                    <p className="text-sm text-slate-400">{content.tips.dmg.desc}</p>
                                </div>
                                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 hover:border-indigo-500 transition-colors">
                                    <Zap className="w-8 h-8 text-yellow-500 mb-3" />
                                    <h3 className="font-bold mb-2">{content.tips.chk.title}</h3>
                                    <p className="text-sm text-slate-400">{content.tips.chk.desc}</p>
                                </div>
                                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 hover:border-indigo-500 transition-colors">
                                    <Activity className="w-8 h-8 text-green-500 mb-3" />
                                    <h3 className="font-bold mb-2">{content.tips.evo.title}</h3>
                                    <p className="text-sm text-slate-400">{content.tips.evo.desc}</p>
                                </div>
                            </div>
                            
                            <div className="bg-indigo-900/20 border border-indigo-500/30 p-4 rounded-lg flex gap-3 text-sm text-indigo-200">
                                <Info className="w-5 h-5 flex-shrink-0" />
                                <p>{content.tips.daily}</p>
                            </div>
                        </section>

                        {/* Level 5 - Strategy */}
                        <section id="lvl5" className="relative overflow-hidden rounded-2xl bg-gradient-to-r from-orange-900/40 to-slate-800 border border-orange-700/30 shadow-lg">
                            <div className="p-6 md:p-8 relative z-10">
                                <h2 className="text-2xl font-bold text-orange-400 mb-4 flex items-center gap-2">
                                    <ChevronRight className="w-6 h-6" />
                                    {content.lvl5.title}
                                </h2>
                                <div className="space-y-4 text-slate-300">
                                    <p>{content.lvl5.desc}</p>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <div className="bg-slate-900/60 p-4 rounded-lg">
                                            <h3 className="text-white font-bold mb-2">{content.lvl5.where}</h3>
                                            <ul className="list-disc list-inside space-y-1 text-sm">
                                                <li>Vila da Névoa (Mist): <span className="text-orange-300">{content.lvl5.mobs.mist}</span></li>
                                                <li>Vila da Folha (Leaf): <span className="text-orange-300">{content.lvl5.mobs.leaf}</span></li>
                                                <li>Vila da Areia (Sand): <span className="text-orange-300">{content.lvl5.mobs.sand}</span></li>
                                            </ul>
                                        </div>
                                        <div className="bg-slate-900/60 p-4 rounded-lg">
                                            <h3 className="text-white font-bold mb-2">{content.lvl5.dist}</h3>
                                            <ul className="list-disc list-inside space-y-1 text-sm">
                                                {content.lvl5.steps.map((step, i) => <li key={i}>{step}</li>)}
                                            </ul>
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-2">{content.lvl5.reset}</p>
                                </div>
                            </div>
                        </section>

                        {/* Builds Section */}
                        <section id="builds">
                            <h2 className="text-3xl font-bold mb-6 text-center">{content.builds.title}</h2>
                            
                            {/* Mastery Selector - Added pt-4 to prevent top cut-off */}
                            <div className="flex overflow-x-auto p-4 gap-2 mb-6 scrollbar-hide snap-x md:justify-center md:flex-wrap">
                                {Object.entries(masteries).map(([key, mastery]) => {
                                    const isActive = activeMastery === key;
                                    return (
                                        <button
                                            key={key}
                                            onClick={() => { setActiveMastery(key); setActiveSubPath('default'); }}
                                            className={`flex flex-col items-center justify-center min-w-[5rem] p-3 rounded-xl border transition-all snap-center
                                                ${isActive 
                                                    ? `bg-${mastery.color}-600/20 border-${mastery.color}-500 text-white shadow-[0_0_15px_rgba(0,0,0,0.5)] scale-105` 
                                                    : 'bg-slate-800 border-slate-700 text-slate-400 hover:bg-slate-700 hover:border-slate-600'
                                                }`}
                                        >
                                            <div className={`mb-2 ${isActive ? `text-${mastery.color}-400` : ''}`}>
                                                {mastery.icon}
                                            </div>
                                            <span className="text-xs font-bold uppercase tracking-wide">{mastery.name}</span>
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Sub-Path Selector */}
                            {Object.keys(currentMastery.paths).length > 1 && (
                                <div className="flex justify-center gap-4 mb-6 animate-fade-in">
                                    {Object.entries(currentMastery.paths).map(([key, path]) => (
                                        <button
                                            key={key}
                                            onClick={() => setActiveSubPath(key)}
                                            className={`px-4 py-2 rounded-full text-sm font-bold transition-colors ${
                                                (activeSubPath === key || (activeSubPath === 'default' && key === 'default'))
                                                    ? `bg-${currentMastery.color}-500 text-white`
                                                    : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                                            }`}
                                        >
                                            {path.label}
                                        </button>
                                    ))}
                                </div>
                            )}

                            {/* Content */}
                            <div className="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-2xl animate-fade-in">
                                <div className={`p-4 border-b border-slate-700 flex items-center gap-3 bg-${currentMastery.color}-900/20`}>
                                    <div className={`p-2 rounded-lg bg-${currentMastery.color}-500/20 text-${currentMastery.color}-400`}>
                                        {currentMastery.icon}
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-bold text-white">{currentMastery.name}</h3>
                                        <p className="text-sm text-slate-400">{currentPath.label}</p>
                                    </div>
                                </div>

                                <div className="grid lg:grid-cols-3 gap-0">
                                    {/* Table */}
                                    <div className="lg:col-span-2 overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-900/50 text-slate-400 text-sm uppercase tracking-wider">
                                                    <th className="p-3">{content.builds.table.lvl}</th>
                                                    <th className="p-3 text-red-400" title="Strength">{content.builds.table.str}</th>
                                                    <th className="p-3 text-yellow-400" title="Fortitude">{content.builds.table.fort}</th>
                                                    <th className="p-3 text-blue-400" title="Intellect">{content.builds.table.int}</th>
                                                    <th className="p-3 text-green-400" title="Agility">{content.builds.table.agi}</th>
                                                    <th className="p-3 text-purple-400" title="Chakra">{content.builds.table.chk}</th>
                                                    <th className="p-3 text-white border-l border-slate-700">{content.builds.table.hp}</th>
                                                    <th className="p-3 text-blue-200">{content.builds.table.cp}</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-700">
                                                {currentPath.stats.map((stat, idx) => renderStatRow(stat, idx))}
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* Notes Sidebar */}
                                    <div className="bg-slate-900/30 p-6 border-l border-slate-700 flex flex-col justify-between">
                                        <div>
                                            <h4 className="font-bold text-lg mb-4 flex items-center gap-2">
                                                <Scroll className="w-5 h-5 text-slate-400" />
                                                {content.builds.notesTitle}
                                            </h4>
                                            <ul className="space-y-4 mb-8">
                                                {getNotes(currentPath.notesType).map((note, idx) => (
                                                    <li key={idx} className="flex gap-3 text-sm text-slate-300 leading-relaxed">
                                                        <span className={`w-1.5 h-1.5 rounded-full mt-2 flex-shrink-0 bg-${currentMastery.color}-500`}></span>
                                                        {note}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>

                                        <div className="mt-6 p-4 bg-yellow-900/10 border border-yellow-700/30 rounded-lg">
                                            <div className="flex items-center gap-2 mb-2 text-yellow-500 font-bold text-sm">
                                                <Users className="w-4 h-4" />
                                                <span>{content.builds.lvl35Title}</span>
                                            </div>
                                            <p className="text-xs text-slate-400 leading-relaxed">
                                                {content.builds.lvl35Desc}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                    </main>
                    
                    <footer className="bg-slate-900 border-t border-slate-800 py-6 text-center">
                        <p className="text-slate-500 text-sm">{content.builds.footer}</p>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Guide />);
    </script>
</body>
</html>
